version: "3.8"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: boyce
      POSTGRES_PASSWORD: password
      POSTGRES_DB: demo_db
    ports:
      - "5433:5432"      # 5433 to avoid collision with a local Postgres on 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boyce -d demo_db"]
      interval: 2s
      timeout: 5s
      retries: 20
    volumes:
      - ./seed.sql:/docker-entrypoint-initdb.d/seed.sql
