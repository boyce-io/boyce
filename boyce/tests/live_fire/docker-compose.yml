version: "3.8"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: boyce
      POSTGRES_PASSWORD: password
      POSTGRES_DB: live_fire_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boyce -d live_fire_db"]
      interval: 2s
      timeout: 5s
      retries: 20
