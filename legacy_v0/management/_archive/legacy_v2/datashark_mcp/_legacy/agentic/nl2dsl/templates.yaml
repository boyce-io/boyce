templates:
  - name: find_entity
    pattern: "FIND ENTITY WHERE {filters}"
    slots:
      - filters
    examples:
      - "Show entities"
      - "Find tables"
      - "List entities"
  
  - name: find_by_system
    pattern: "FIND ENTITY WHERE system='{system}'"
    slots:
      - system
    examples:
      - "Show database entities"
      - "Find entities in system {system}"
  
  - name: search_term
    pattern: "SEARCH '{term}'"
    slots:
      - term
    examples:
      - "Search for {term}"
      - "Find {term}"
  
  - name: path_between
    pattern: "PATH FROM '{from_id}' TO '{to_id}'"
    slots:
      - from_id
      - to_id
    examples:
      - "Path between {from_id} and {to_id}"
      - "Show relationship between {from_id} and {to_id}"
      - "How does {from_id} connect to {to_id}"

