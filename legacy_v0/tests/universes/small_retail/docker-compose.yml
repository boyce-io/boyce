version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: datashark_retail_db
    ports:
      - "5439:5432"
    environment:
      POSTGRES_USER: shark
      POSTGRES_PASSWORD: shark
      POSTGRES_DB: retail_db
    volumes:
      - ./seed_data:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shark -d retail_db"]
      interval: 5s
      timeout: 5s
      retries: 5
